<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>fotokita blurrr</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      transition: filter 0.15s ease;
    }

    video.blurred {
      filter: blur(8px) brightness(0.9);
    }

    canvas { display: none; }

    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      transition: opacity 0.5s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
      text-align: center;
      padding: 24px;
      font-family: sans-serif;
    }
    #error-msg.show { display: flex; }
    #error-msg p { color: #888; font-size: 0.85rem; max-width: 260px; line-height: 1.6; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div id="error-msg">
  <h2 style="font-size:1rem;font-family:sans-serif">kamera tidak dapat diakses</h2>
  <p>izinkan akses kameranya di browser, lalu muat ulang halaman.</p>
</div>

<video id="video" autoplay muted playsinline></video>
<!-- canvas hanya untuk copy frame ke mediapipe -->
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

<script>
  const video   = document.getElementById('video');
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const loadEl  = document.getElementById('loading');
  const errorEl = document.getElementById('error-msg');

  let isBlurred = false;
  let processing = false; // lock agar tidak tumpuk

  function setBlur(active) {
    if (active === isBlurred) return;
    isBlurred = active;
    video.classList.toggle('blurred', active);
  }

  function fingerUp(tip, pip, lm) {
    return lm[tip].y < lm[pip].y;
  }

  function isPeace(lm) {
    const indexUp   = fingerUp(8,  6,  lm);
    const middleUp  = fingerUp(12, 10, lm);
    const ringDown  = !fingerUp(16, 14, lm);
    const pinkyDown = !fingerUp(20, 18, lm);
    const thumbFolded = Math.abs(lm[4].x - lm[3].x) < 0.15;
    return indexUp && middleUp && ringDown && pinkyDown && thumbFolded;
  }

  (async () => {
    // 1. Init MediaPipe Hands
    const hands = new Hands({
      locateFile: f =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 0,
      minDetectionConfidence: 0.4,
      minTrackingConfidence: 0.3,
    });

    hands.onResults(results => {
      processing = false; // selesai, boleh kirim frame berikutnya
      let peace = false;
      if (results.multiHandLandmarks?.length) {
        for (const lm of results.multiHandLandmarks) {
          if (isPeace(lm)) { peace = true; break; }
        }
      }
      setBlur(peace);
    });

    // 2. Akses kamera
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width:  { ideal: 1920 },
          height: { ideal: 1080 },
          facingMode: 'user',
          frameRate: { ideal: 30 }
        },
        audio: false,
      });

      video.srcObject = stream;
      await video.play();

      // Sesuaikan ukuran canvas dengan video asli
      video.addEventListener('loadedmetadata', () => {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
      });

      // 3. Loop manual pakai RAF — bekerja di semua env termasuk GitHub Pages
      async function loop() {
        if (!processing && video.readyState >= 2) {
          processing = true;
          // Gambar frame video ke canvas lalu kirim ke mediapipe
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          await hands.send({ image: canvas });
        }
        requestAnimationFrame(loop);
      }

      // Warmup model dulu sebelum mulai loop
      await hands.initialize();

      setTimeout(() => {
        loadEl.classList.add('hidden');
        loop();
      }, 500);

    } catch (err) {
      console.error(err);
      loadEl.classList.add('hidden');
      errorEl.classList.add('show');
    }
  })();
</script>
</body>
</html>
