<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fotokuta blurrr</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      transition: filter 0.2s ease;
    }

#start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 10px 24px;
      font-size: 13px;
      letter-spacing: 0.08em;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.2s, border-color 0.2s;
      z-index: 10;
      white-space: nowrap;
    }

    #start-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="video" autoplay muted playsinline></video>
<button id="start-btn">Tap to Start Camera</button>
  </div>

  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
    const video = document.getElementById('video');
    const btn   = document.getElementById('start-btn');

    // ── Gesture detection ──────────────────────────────────────────
    // Landmark indices
    const TIP  = [4, 8, 12, 16, 20];
    const PIP  = [3, 7, 11, 15, 19]; // one joint below tip for fingers 1-4
    const MCP  = [2, 5, 9, 13, 17];  // knuckle

    function isFingerUp(lm, fingerIndex) {
      // fingerIndex: 0=thumb(skip), 1=index, 2=middle, 3=ring, 4=pinky
      // Compare tip.y < pip.y (y axis: 0=top, 1=bottom in MediaPipe)
      const tip = lm[TIP[fingerIndex]];
      const pip = lm[PIP[fingerIndex]];
      return tip.y < pip.y;
    }

    function isFingerDown(lm, fingerIndex) {
      const tip = lm[TIP[fingerIndex]];
      const mcp = lm[MCP[fingerIndex]];
      return tip.y > mcp.y;
    }

    function isPeaceSign(lm) {
      const indexUp  = isFingerUp(lm, 1);
      const middleUp = isFingerUp(lm, 2);
      const ringDown = isFingerDown(lm, 3);
      const pinkyDown= isFingerDown(lm, 4);
      return indexUp && middleUp && ringDown && pinkyDown;
    }

    // ── MediaPipe Hands ────────────────────────────────────────────
    let blurActive = false;

    function onResults(results) {
      let peace = false;

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        results.multiHandLandmarks.forEach((landmarks) => {
          if (isPeaceSign(landmarks)) peace = true;
        });
      }

      // Apply or remove blur
      if (peace !== blurActive) {
        blurActive = peace;
        video.style.filter = blurActive ? 'blur(8px)' : 'blur(0px)';
      }
    }

    const hands = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    // ── Camera start ───────────────────────────────────────────────
    let camera = null;

    btn.addEventListener('click', () => {
      btn.style.display = 'none';

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
      })
      .then((stream) => {
        video.srcObject = stream;
        video.play();

        camera = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 1280,
          height: 720
        });
        camera.start();
      })
      .catch((err) => {
        btn.style.display = 'block';
        btn.textContent = 'Camera access denied. Try again.';
        console.error(err);
      });
    });
  </script>
</body>
</html>
