<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>fotokita blurrr</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; }

    video {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      object-fit:cover;
      transform:scaleX(-1);
      transition:filter 0.12s ease;
    }
    video.blurred { filter:blur(8px) brightness(0.88); }

    canvas { display:none; }

    #loading {
      position:fixed; inset:0; background:#000;
      display:flex; align-items:center; justify-content:center;
      z-index:99; transition:opacity 0.4s ease;
    }
    #loading.hidden { opacity:0; pointer-events:none; }
    .spinner {
      width:38px; height:38px;
      border:3px solid #333; border-top-color:#fff;
      border-radius:50%; animation:spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    #err {
      display:none; position:fixed; inset:0; background:#000; color:#fff;
      align-items:center; justify-content:center; flex-direction:column;
      gap:10px; z-index:100; text-align:center; padding:24px; font-family:sans-serif;
    }
    #err.show { display:flex; }
    #err p { color:#777; font-size:.83rem; max-width:260px; line-height:1.6; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>
<div id="err">
  <h2 style="font-size:1rem;font-family:sans-serif">Kamera tidak dapat diakses</h2>
  <p>Izinkan akses kamera di browser, lalu muat ulang halaman.</p>
</div>

<video id="video" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

<script>
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const loadEl = document.getElementById('loading');
  const errEl  = document.getElementById('err');

  let isBlurred  = false;
  let busy       = false;

  function setBlur(v) {
    if (v === isBlurred) return;
    isBlurred = v;
    video.classList.toggle('blurred', v);
  }

  /* ---------- Deteksi ✌️ Peace / Victory ----------
   *
   * Strategi: bandingkan posisi TIP jari vs MCP (pangkal jari).
   * Ini lebih stabil dari pip karena jarak lebih jauh → lebih tahan noise.
   *
   * Landmark index:
   *   Ibu jari  : 1(cmc) 2(mcp) 3(ip)  4(tip)
   *   Telunjuk  : 5(mcp) 6(pip) 7(dip) 8(tip)
   *   Jari tgh  : 9(mcp) 10(pip)11(dip)12(tip)
   *   Jari manis:13(mcp) 14(pip)15(dip)16(tip)
   *   Kelingking:17(mcp) 18(pip)19(dip)20(tip)
   */
  function dist(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx*dx + dy*dy);
  }

  function isPeace(lm) {
    // Ukuran referensi: panjang telapak (wrist ke tengah-MCP)
    const palmSize = dist(lm[0], lm[9]);
    if (palmSize < 0.01) return false; // tangan terlalu kecil / jauh

    // Jari "tegak" = tip-y jauh lebih tinggi dari mcp-y
    // threshold relatif terhadap ukuran telapak agar konsisten dari jauh
    const threshold = palmSize * 0.3;

    const indexUp   = (lm[5].y - lm[8].y)  > threshold;   // tip lebih tinggi dari mcp
    const middleUp  = (lm[9].y - lm[12].y)  > threshold;
    const ringDown  = (lm[16].y - lm[13].y) > -threshold * 0.3; // tip TIDAK lebih tinggi
    const pinkyDown = (lm[20].y - lm[17].y) > -threshold * 0.3;

    return indexUp && middleUp && ringDown && pinkyDown;
  }

  (async () => {
    const hands = new Hands({
      locateFile: f =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
    });

    hands.setOptions({
      maxNumHands:            2,
      modelComplexity:        0,
      minDetectionConfidence: 0.35,
      minTrackingConfidence:  0.25,
    });

    hands.onResults(results => {
      busy = false;
      if (!results.multiHandLandmarks?.length) { setBlur(false); return; }
      let peace = false;
      for (const lm of results.multiHandLandmarks) {
        if (isPeace(lm)) { peace = true; break; }
      }
      setBlur(peace);
    });

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width:{ideal:1920}, height:{ideal:1080},
                 facingMode:'user', frameRate:{ideal:30} },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      video.addEventListener('loadedmetadata', () => {
        canvas.width  = video.videoWidth  || 1280;
        canvas.height = video.videoHeight || 720;
      });

      await hands.initialize();
      loadEl.classList.add('hidden');

      function loop() {
        if (!busy && video.readyState >= 2 && canvas.width > 0) {
          busy = true;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          hands.send({ image: canvas }).catch(() => { busy = false; });
        }
        requestAnimationFrame(loop);
      }
      loop();

    } catch (e) {
      console.error(e);
      loadEl.classList.add('hidden');
      errEl.classList.add('show');
    }
  })();
</script>
</body>
</html>
