
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>fotokita blurrr</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; }

    video {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      object-fit:cover;
      transform:scaleX(-1);
      transition:filter 0.15s ease;
    }
    video.blurred { filter:blur(10px) brightness(0.85); }

    canvas { display:none; }

    #loading {
      position:fixed; inset:0; background:#000;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      z-index:99; transition:opacity 0.4s ease;
    }
    #loading.hidden { opacity:0; pointer-events:none; }
    .spinner {
      width:38px; height:38px;
      border:3px solid #222; border-top-color:#fff;
      border-radius:50%; animation:spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #load-text {
      color:#555; font-family:sans-serif;
      font-size:12px; letter-spacing:.5px;
    }

    #err {
      display:none; position:fixed; inset:0; background:#000; color:#fff;
      align-items:center; justify-content:center; flex-direction:column;
      gap:12px; z-index:100; text-align:center; padding:24px; font-family:sans-serif;
    }
    #err.show { display:flex; }
    #err h2 { font-size:1rem; }
    #err p { color:#555; font-size:.82rem; max-width:280px; line-height:1.7; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="load-text">Memulai kamera...</div>
</div>

<div id="err">
  <h2>Kamera tidak dapat diakses</h2>
  <p>Izinkan akses kamera di browser, lalu muat ulang halaman.</p>
</div>

<video id="video" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>

<script type="module">
// Gunakan MediaPipe Tasks Vision — paling stabil di mobile & GitHub Pages
import { GestureRecognizer, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js';

const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const loadEl = document.getElementById('loading');
const loadTx = document.getElementById('load-text');
const errEl  = document.getElementById('err');

let recognizer = null;
let isBlurred  = false;
let lastTs     = -1;

function setBlur(v) {
  if (v === isBlurred) return;
  isBlurred = v;
  video.classList.toggle('blurred', v);
}

// ── STEP 1: Kamera duluan ──────────────────────────────────
try {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      width:      { ideal: 1280 },
      height:     { ideal: 720 },
      facingMode: 'user',
      frameRate:  { ideal: 30 }
    },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
  await new Promise(r => video.addEventListener('loadedmetadata', r, { once: true }));
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
} catch(e) {
  console.error(e);
  loadEl.classList.add('hidden');
  errEl.classList.add('show');
  throw e;
}

// ── STEP 2: Load model di background ──────────────────────
loadTx.textContent = 'Memuat model...';

const vision = await FilesetResolver.forVisionTasks(
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
);

recognizer = await GestureRecognizer.createFromOptions(vision, {
  baseOptions: {
    modelAssetPath:
      'https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task',
    delegate: 'GPU'
  },
  runningMode:        'VIDEO',
  numHands:           2,
  minHandDetectionConfidence: 0.4,
  minHandPresenceConfidence:  0.4,
  minTrackingConfidence:      0.4,
});

loadEl.classList.add('hidden');

// ── STEP 3: Deteksi gesture per frame ─────────────────────
// MediaPipe GestureRecognizer mengenali "Victory" = ✌️ secara langsung
// Tidak perlu hitung landmark manual lagi!
function loop(ts) {
  if (recognizer && video.readyState >= 2 && ts !== lastTs) {
    lastTs = ts;
    const result = recognizer.recognizeForVideo(video, ts);

    let peace = false;
    if (result.gestures?.length) {
      for (const gestureList of result.gestures) {
        // gestureList[0].categoryName bisa: "Victory", "Thumb_Up", dll
        if (gestureList[0]?.categoryName === 'Victory') {
          peace = true;
          break;
        }
      }
    }
    setBlur(peace);
  }
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
